<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Static Website</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      line-height: 1.6;
      background: #f9f9f9;
    }

    header {
      background: #0077ff;
      color: white;
      padding: 15px 20px;
      text-align: center;
    }

    nav {
      background: #005fcc;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .container {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 15px 0;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    footer {
      background: #333;
      color: white;
      text-align: center;
      padding: 10px;
      margin-top: 20px;
    }

    button {
      padding: 10px 15px;
      background: #0077ff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #005fcc;
    }
  </style>
</head>
<body>

<header>
  <h1>My Static Website</h1>
  <p>Hosted anywhere (GitHub Pages, Netlify, etc.)</p>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#about">About</a>
  <a href="#contact">Contact</a>
</nav>

<div class="container">

  <div class="card">
    <h2>Home</h2>
    <p>Welcome to my static website. This page works without any backend.</p>
    <button onclick="sayHello()">Click Me</button>
  </div>

  <div class="card" id="about">
    <h2>About</h2>
    <p>This is a simple static site built using HTML, CSS, and a little JavaScript.</p>
  </div>

  <div class="card" id="contact">
    <h2>Contact</h2>
    <p>Email: example@email.com</p>
  </div>

</div>

<footer>
  <p>© 2026 My Website</p>
</footer>

<script>
  function sayHello() {
    alert("Hello! Your static site is working 🎉");
  }
</script>

</body>
</html>
